project:
  type: website

website:
  title: "NeuroShepherd"
  site-url: https://neuroshepherd.github.io
  description: "Data science, coding, and statistical programming"
  image: images/neuroshepherd.png
  search: true
  # https://quarto.org/docs/websites/website-tools.html#open-graph
  open-graph:
    locale: en_US
  # https://quarto.org/docs/websites/website-llms.html#enabling-llms.txt
  llms-txt: true
  page-footer:
    left: "© 2026 Pat Callahan"
    center: "Built with [Quarto](https://quarto.org)"
    right:
      - icon: github
        href: https://github.com/NeuroShepherd/neuroshepherd.github.io

  navbar:
    title: "navbar title"
    logo: images/neuroshepherd.png
    left:
      - href: index.qmd
        text: Home
      - about.qmd
      - posts.qmd
      - projects.qmd
    right:
      - icon: github
        href: https://github.com/NeuroShepherd
      - icon: rss
        href: posts.xml

format:
  html:
    theme:
      light: [flatly, brand]
      dark: [darkly, brand]
    syntax-highlighting:
      light: github
      dark: arrow
    toc: false
    link-external-newwindow: true
    link-external-icon: true
    # code-links: repo
    anchor-sections: true
    # code-line-numbers: true
    code-link: true
    code-fold: true
    code-summary: "Show Me the Code!"
    code-copy: true
    code-overflow: wrap
