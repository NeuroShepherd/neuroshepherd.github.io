project:
  type: website

website:
  title: "NeuroShepherd"
  site-url: https://neuroshepherd.github.io
  description: "Data science, coding, and statistical programming"
  image: images/neuroshepherd.png

  # https://quarto.org/docs/websites/website-tools.html#open-graph
  open-graph:
    locale: en_US

  # https://quarto.org/docs/websites/website-llms.html#enabling-llms.txt
  llms-txt: true

  navbar:
    title: "navbar title"
    logo: images/neuroshepherd.png
    left:
      - href: index.qmd
        text: Home
      - about.qmd
      - posts.qmd
      - projects.qmd
    right:
      - icon: github
        href: https://github.com/NeuroShepherd
      - icon: rss
        href: posts.xml

  page-footer:
    left: "© 2026 Pat Callahan"
    center: "Built with [Quarto](https://quarto.org)"
    right:
      - icon: github
        href: https://github.com/NeuroShepherd/neuroshepherd.github.io

  search: true

format:
  html:
    theme:
      light: flatly
      dark: darkly
    toc: false
    code-copy: true
    code-overflow: scroll
    linestretch: 1.4
    fontsize: 1.05em
