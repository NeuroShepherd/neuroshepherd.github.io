# https://quarto.org/docs/authoring/brand.html

typography:
  fonts:
    - family: Inter
      source: google
      weight: [400, 500, 600, 700]
    - family: "JetBrains Mono"
      source: google
      weight: [400, 500]
  base:
    family: Inter
    size: 1.15rem
    line-height: 1.5
  headings:
    family: Inter
    weight: 600
  monospace:
    family: '"JetBrains Mono", "Fira Code", monospace'

# color:
# none of these are in use, but can be accessed with shortcodes like {{< color navy >}}
# or {{< color accent >}} or in SCSS with $brand-accent
# palette:
#   accent: "#2E86C1"
#   navy: "#1B2631"
#   teal: "#17A589"
