# https://quarto.org/docs/authoring/brand.html

typography:
  fonts:
    - family: Inter
      source: google
      weight: [400, 500, 600, 700]
    - family: "JetBrains Mono"
      source: google
      weight: [400, 500]
  base:
    family: Inter
    size: 1.15rem
    line-height: 1.5
  headings:
    family: Inter
    weight: 600
  monospace:
    family: '"JetBrains Mono", "Fira Code", monospace'
  link:
    color: peach

color:
  palette:
    terracotta: "#e35336"
    peach: "#e3bb98"
    lavender: "#9988A1"
    earth: "#8a2b0e"
  primary: terracotta
  secondary: earth
  tertiary: lavender
  light: peach

logo:
  images:
    icon: images/person-running-solid-full.svg
    default: images/neuroshepherd.png
  small: icon
  medium: default
  large: default
